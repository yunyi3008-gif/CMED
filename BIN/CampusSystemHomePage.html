<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In to Memo Campus</title>
<style>
    .side-bar {
        top: 150px;
        height: 70px;
        width: 70px;
        background-color:#fff;
        border-radius: 50px;
        position: relative;
        transition: 0.4s ease;
    }
    .ToggleBox{
        position: relative;
        display: block;
        height: 70px;
        width: 70px;
        border-radius: 50px;
    }
    .icon{
        position: absolute;
        height: 4px;
        width: 35px;
        top: 50%;
        left: 50%;
        transform: translate(-50%,-50%);
        background-color: #161d2c;
        border-radius: 50px;
    }
    .icon::before,.icon::after{
        position: absolute;
    }
</style>
</head>
<body>
    <div class ="side-bar">
        <a href = "#" class="ToggleBox">
            <span class="icon"></span>
        </a>
    </div>
</body>
</style>
</html>
